<div class="max-w-[1400px] mx-auto px-6 md:px-12 pt-32 pb-8">
    <nav aria-label="Breadcrumb">
        <ol id="breadcrumb-list" class="flex items-center space-x-2 font-h2 text-xs text-text-sub">
            <!-- Breadcrumbs will be populated dynamically or static depending on page -->
        </ol>
    </nav>
</div>
<script>
    // Simple dynamic JS to populate breadcrumbs based on the path
    const path = window.location.pathname;
    const list = document.getElementById('breadcrumb-list');

    let html = '<li><a href="../index.html" class="hover:text-accent transition-colors">HOME</a></li>';

    if (path.includes('/about/')) {
        html += '<li class="text-text/30 mx-2">/</li><li class="text-text" aria-current="page">ABOUT</li>';
    } else if (path.includes('/cases/')) {
        html += '<li class="text-text/30 mx-2">/</li><li><a href="../cases/index.html" class="hover:text-accent transition-colors">CASES</a></li>';

        if (path.includes('case-a.html')) {
            html += '<li class="text-text/30 mx-2">/</li><li class="text-text mt-1 md:mt-0" aria-current="page">CASE A</li>';
        } else if (path.includes('case-b.html')) {
            html += '<li class="text-text/30 mx-2">/</li><li class="text-text mt-1 md:mt-0" aria-current="page">CASE B</li>';
        } else if (path.includes('case-c.html')) {
            html += '<li class="text-text/30 mx-2">/</li><li class="text-text mt-1 md:mt-0" aria-current="page">CASE C</li>';
        }
    } else if (path.includes('/contact/')) {
        html += '<li class="text-text/30 mx-2">/</li><li class="text-text" aria-current="page">CONTACT</li>';
    }

    if (list) list.innerHTML = html;
</script>
