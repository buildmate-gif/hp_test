                        'num': ['"DM Mono"', 'monospace'],
                        'serif': ['"Noto Serif JP"', 'serif'],

    <style>
        body {
            background-color: #F5F7FA;
            color: #1C1B18;
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 2.0;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .font-num {
            font-family: 'DM Mono', monospace;
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(2.5rem);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .animate-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-link {
            position: relative;
            display: inline-block;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: #C45C1A;
            transform-origin: bottom left;
            transition: transform 0.25s ease-out;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        .section-num {
            position: relative;
            display: inline-block;
        }

        .section-num::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: #C45C1A;
            transform-origin: left;
            transition: transform 0.3s ease-out;
        }

        .section-num-col:hover .section-num::after {
            transform: scaleX(1);
        }

        /* 縦書き用ユーティリティ */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
    </style>
</head>

<body class="antialiased selection:bg-accent selection:text-surface">

                <span class="font-h1 font-bold text-xl tracking-tighter">BUILDTECH<span
                        class="text-accent">AI</span></span>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center space-x-8">
                <a href="../index.html#services"

                <a href="../index.html#cases"

                <a href="../index.html#faq"
                    class="font-h2 text-sm text-text-sub hover:text-text transition-colors nav-link nav-item">よくある質問</a>

                    class="font-h2 text-sm text-text-sub hover:text-text transition-colors nav-link">コラム</a>
                <a href="../index.html#company"
                    class="font-h2 text-sm text-text-sub hover:text-text transition-colors nav-link nav-item">会社案内</a>
            </nav>

            <a href="../contact/index.html"
                class="hidden md:inline-block px-6 py-3 bg-primary text-surface font-h2 text-sm hover:opacity-90 transition-opacity">
                お問い合わせ
            </a>

            <!-- Mobile Menu Button -->
            <button type="button" class="md:hidden text-text p-2" onclick="toggleMobileMenu()" aria-label="Toggle Menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"

    <!-- ▼ 追加: A-1 モバイルメニュー -->
    <div id="mobile-menu-overlay"
        class="fixed inset-0 bg-surface/95 backdrop-blur-md z-40 hidden flex-col items-center justify-center space-y-8 h-screen overflow-y-auto w-full left-0 top-0">
        <button type="button" class="absolute top-6 right-6 text-text p-2" onclick="toggleMobileMenu()"
            aria-label="Close Menu">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M6 18L18 6M6 6l12 12">
                </path>
            </svg>
        </button>
        <a href="../index.html#services" class="font-h1 text-2xl text-text hover:text-accent"
            onclick="toggleMobileMenu()">サービス</a>
        <a href="../index.html#cases" class="font-h1 text-2xl text-text hover:text-accent"
            onclick="toggleMobileMenu()">導入事例</a>
        <a href="../index.html#faq" class="font-h1 text-2xl text-text hover:text-accent"
            onclick="toggleMobileMenu()">よくある質問</a>
        <a href="../column/index.html" class="font-h1 text-2xl text-text hover:text-accent"
            onclick="toggleMobileMenu()">コラム</a>
        <a href="../index.html#company" class="font-h1 text-2xl text-text hover:text-accent"
            onclick="toggleMobileMenu()">会社案内</a>
        <a href="../contact/index.html"
            class="mt-8 px-8 py-4 bg-primary text-surface font-h2 text-sm tracking-widest hover:opacity-90 transition-opacity"
            onclick="toggleMobileMenu()">お問い合わせ</a>
    </div>

    <main class="pt-24">
        <div id="breadcrumb"></div>

        <!-- HERO FOR COLUMN -->
        <section class="pb-24 pt-12 border-b border-primary/10 w-full relative">
            <div class="max-w-[1400px] mx-auto px-6 md:px-12 grid grid-cols-12 md:gap-x-8">
                <div class="col-span-12 md:col-span-2 section-num-col">
                    <span class="font-num text-sm text-accent section-num">COLUMN</span>
                </div>
                <div class="col-span-12 md:col-span-10 animate-on-scroll">
                    <h1 class="font-h1 text-5xl md:text-6xl text-text tracking-tighter mb-6">COLUMN</h1>
                    <p class="font-body text-text-sub text-lg max-w-2xl leading-relaxed">
                        建設DXに関する最新の知見や、活用ノウハウをご紹介します。
                    </p>
                </div>
            </div>
        </section>

        <section class="py-24 md:py-32 w-full text-center">
            <div class="max-w-[1400px] mx-auto px-6 md:px-12 animate-on-scroll">
                <p class="font-body text-text-sub text-lg">
                    コラム記事は現在準備中です。公開までもうしばらくお待ちください。
                </p>
                <div class="mt-12">
                    <a href="../index.html"
                        class="inline-flex justify-center items-center px-8 py-3 bg-text text-surface font-h2 text-sm tracking-widest hover:bg-accent transition-colors">
                        トップページへ戻る
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div id="cta-component"></div>
    <div id="footer"></div>

    <script>
        async function loadComponent(id, path) {
            try {
                const res = await fetch(path);
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById(id).innerHTML = html;
                    document.getElementById(id).querySelectorAll('a').forEach(a => {
                        let href = a.getAttribute('href');
                        if (href && href.startsWith('/')) {
                            a.setAttribute('href', '../' + href.substring(1));
                        }
                    });

                    // IF breadcrumb, re-initialize its script
                    if (id === 'breadcrumb') {
                        const pathString = window.location.pathname;
                        const list = document.getElementById('breadcrumb-list');
                        let htmlStr = '<li><a href="../index.html" class="hover:text-accent transition-colors">HOME</a></li>';
                        htmlStr += '<li class="text-text/30 mx-2">/</li><li class="text-text font-bold" aria-current="page">COLUMN</li>';
                        if (list) list.innerHTML = htmlStr;
                    }
                }
            } catch (e) { }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('breadcrumb', '../components/breadcrumb.html');
            loadComponent('cta-component', '../components/cta-section.html');
            loadComponent('footer', '../components/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { threshold: 0.1 });

            setTimeout(() => {
                document.querySelectorAll('.animate-on-scroll').forEach((el) => observer.observe(el));
            }, 500); // Wait for components to load
        });

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu-overlay');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                menu.classList.add('flex');
            } else {
                menu.classList.add('hidden');
                menu.classList.remove('flex');
            }
        }

        // Header scroll behavior
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (header && window.scrollY > 50) {
                header.style.backgroundColor = 'rgba(245,247,250,0.95)';
                header.style.backdropFilter = 'blur(8px)';
                header.classList.add('shadow-sm');
                header.classList.remove('py-4');
                header.classList.add('py-2');
            } else if (header) {
                header.style.backgroundColor = 'transparent';
                header.style.backdropFilter = 'none';
                header.classList.remove('shadow-sm');
                header.classList.add('py-4');
                header.classList.remove('py-2');
            }
        });
    </script>
</body>

</html>
