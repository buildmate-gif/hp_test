<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料相談・お問い合わせ | 株式会社BuildTech AI</title>
    <meta name="description" content="株式会社BuildTech AIへの無料相談・お問い合わせはこちら。2営業日以内に担当者よりご返信いたします。秘密事項は厳守いたします。">
    <meta property="og:title" content="無料相談・お問い合わせ | 株式会社BuildTech AI">
    <meta property="og:description" content="株式会社BuildTech AIへの無料相談・お問い合わせはこちら。2営業日以内に担当者よりご返信いたします。">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <link rel="canonical" href="https://example.com/contact/index.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B3A6B',
                        accent: '#C45C1A',
                        surface: '#EDEAE4',
                        bg: '#F5F7FA',
                        text: '#1C1B18',
                        'text-sub': '#5C5C5C',
                    },
                    fontFamily: {
                        'h1': ['"Space Grotesk"', 'sans-serif'],
                        'h2': ['"Space Grotesk"', 'sans-serif'],
                        'body': ['"Noto Sans JP"', 'sans-serif'],
                        'num': ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F5F7FA;
            color: #1C1B18;
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 2.0;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .font-num {
            font-family: 'DM Mono', monospace;
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(2.5rem);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .animate-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-num {
            position: relative;
            display: inline-block;
        }

        .section-num::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: #C45C1A;
            transform-origin: left;
            transition: transform 0.3s ease-out;
        }

        .section-num-col:hover .section-num::after {
            transform: scaleX(1);
        }

        input,
        select,
        textarea {
            background-color: transparent;
            border: 1px solid rgba(28, 27, 24, 0.2);
            border-radius: 0;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1B3A6B;
        }
    </style>
</head>

<body class="antialiased selection:bg-accent selection:text-surface">

    <div id="header"></div>

    <main class="pt-24 min-h-screen">
        <div id="breadcrumb"></div>

        <section class="pb-12 pt-12 w-full">
            <div class="max-w-[1400px] mx-auto px-6 md:px-12 grid grid-cols-12 md:gap-x-8">
                <div class="col-span-12 md:col-span-2 section-num-col">
                    <span class="font-num text-sm text-accent section-num">03 / CONTACT</span>
                </div>
                <div class="col-span-12 md:col-span-10 animate-on-scroll">
                    <h1 class="font-h1 text-5xl md:text-6xl text-text tracking-tighter mb-6">CONTACT US</h1>
                    <p class="font-body text-text-sub text-lg max-w-2xl leading-relaxed mb-6">
                        「何から始めていいかわからない」という状態からで構いません。<br>御社の現状と課題をお聞かせください。</p>

                    <div
                        class="flex flex-col sm:flex-row gap-6 font-body text-sm text-text-sub border-l-2 border-accent pl-6 py-2">
                        <div class="flex items-center"><span class="text-accent mr-2">■</span>相談料完全無料</div>
                        <div class="flex items-center"><span class="text-accent mr-2">■</span>秘密事項厳守</div>
                        <div class="flex items-center"><span class="text-accent mr-2">■</span>2営業日以内にご返信</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-12 pb-32 w-full relative">
            <div class="max-w-[1400px] mx-auto px-6 md:px-12 grid grid-cols-12 md:gap-x-8">
                <div class="col-span-12 md:col-span-2 hidden md:block border-r border-primary/10">
                    <!-- 空白カラム -->
                </div>

                <div
                    class="col-span-12 md:col-span-8 lg:col-span-6 bg-surface p-8 md:p-12 border-t border-primary/20 animate-on-scroll">

                    <!-- 成功メッセージ用（初期非表示） -->
                    <div id="success-message" class="hidden mb-8 p-6 border-l-4 border-primary bg-bg text-text">
                        <h3 class="font-h2 text-lg mb-2">お問い合わせを受け付けました。</h3>
                        <p class="font-body text-sm text-text-sub">内容を確認の上、2営業日以内に担当者よりご指定のメールアドレス宛にご連絡いたします。</p>
                    </div>

                    <form id="contact-form" class="space-y-8" novalidate>

                        <div>
                            <label for="company" class="block font-h2 text-xs text-text mb-2">会社名 <span
                                    class="bg-text/10 text-text/60 px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">任意</span></label>
                            <input type="text" id="company" name="company"
                                class="w-full px-4 py-3 font-body text-sm text-text" placeholder="株式会社〇〇建設">
                        </div>

                        <div>
                            <label for="name" class="block font-h2 text-xs text-text mb-2">お名前 <span
                                    class="bg-accent text-surface px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">必須</span></label>
                            <input type="text" id="name" name="name" required
                                class="w-full px-4 py-3 font-body text-sm text-text" placeholder="建設 太郎">
                            <p class="error-msg text-[10px] text-accent mt-1 hidden" id="err-name">お名前を入力してください。</p>
                        </div>

                        <div>
                            <label for="email" class="block font-h2 text-xs text-text mb-2">メールアドレス <span
                                    class="bg-accent text-surface px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">必須</span></label>
                            <input type="email" id="email" name="email" required
                                class="w-full px-4 py-3 font-body text-sm text-text" placeholder="info@example.com">
                            <p class="error-msg text-[10px] text-accent mt-1 hidden" id="err-email">有効なメールアドレスを入力してください。
                            </p>
                        </div>

                        <div>
                            <label for="phone" class="block font-h2 text-xs text-text mb-2">電話番号 <span
                                    class="bg-text/10 text-text/60 px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">任意</span></label>
                            <input type="tel" id="phone" name="phone"
                                class="w-full px-4 py-3 font-body text-sm text-text" placeholder="03-0000-0000">
                        </div>

                        <div>
                            <label for="inquiry_type" class="block font-h2 text-xs text-text mb-2">お問い合わせ種別 <span
                                    class="bg-accent text-surface px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">必須</span></label>
                            <div class="relative">
                                <select id="inquiry_type" name="inquiry_type" required
                                    class="w-full px-4 py-3 font-body text-sm text-text appearance-none pr-10">
                                    <option value="" disabled selected>選択してください</option>
                                    <option value="AI導入相談">AI導入相談</option>
                                    <option value="資料請求">資料請求</option>
                                    <option value="その他">その他</option>
                                </select>
                                <div
                                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"
                                            d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </div>
                            <p class="error-msg text-[10px] text-accent mt-1 hidden" id="err-type">種別を選択してください。</p>
                        </div>

                        <div>
                            <label for="message" class="block font-h2 text-xs text-text mb-2">お問い合わせ内容 <span
                                    class="bg-text/10 text-text/60 px-2 py-0.5 ml-2 font-body text-[10px] tracking-wider rounded-sm">任意</span></label>
                            <textarea id="message" name="message" rows="5"
                                class="w-full px-4 py-3 font-body text-sm text-text"
                                placeholder="現状の課題やご相談内容をご自由にご記入ください。"></textarea>
                        </div>

                        <div class="pt-6 border-t border-text/10">
                            <button type="submit"
                                class="w-full sm:w-auto inline-flex justify-center items-center px-12 py-5 bg-primary text-surface font-h2 text-base tracking-widest hover:bg-text transition-colors group">
                                送信すること →
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </section>

    </main>

    <div id="footer"></div>

    <script>
        async function loadComponent(id, path) {
            try {
                const res = await fetch(path);
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById(id).innerHTML = html;
                    // Fix relative paths
                    document.getElementById(id).querySelectorAll('a').forEach(a => {
                        let href = a.getAttribute('href');
                        if (href && href.startsWith('/')) {
                            a.setAttribute('href', '../' + href.substring(1));
                        }
                    });
                    if (id === 'breadcrumb') {
                        const list = document.getElementById('breadcrumb-list');
                        let htmlStr = '<li><a href="../index.html" class="hover:text-accent transition-colors">HOME</a></li>';
                        htmlStr += '<li class="text-text/30 mx-2">/</li><li class="text-text font-bold" aria-current="page">CONTACT</li>';
                        if (list) list.innerHTML = htmlStr;
                    }
                }
            } catch (e) { }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('header', '../components/header.html');
            loadComponent('breadcrumb', '../components/breadcrumb.html');
            // Contact page doesn't need CTA section per request usually, as it IS the CTA. But if needed, just header/footer.
            loadComponent('footer', '../components/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('is-visible'); });
            }, { threshold: 0.1 });

            setTimeout(() => {
                document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
            }, 500);

            // Form validation and submit
            const form = document.getElementById('contact-form');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const typeInput = document.getElementById('inquiry_type');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                // Hide existing errors
                document.querySelectorAll('.error-msg').forEach(el => el.classList.add('hidden'));

                if (nameInput.value.trim() === '') {
                    isValid = false;
                    document.getElementById('err-name').classList.remove('hidden');
                }

                if (typeInput.value === '') {
                    isValid = false;
                    document.getElementById('err-type').classList.remove('hidden');
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(emailInput.value.trim())) {
                    isValid = false;
                    document.getElementById('err-email').classList.remove('hidden');
                }

                if (isValid) {
                    // Simulate form dispatch
                    form.style.display = 'none';
                    const successMsg = document.getElementById('success-message');
                    successMsg.classList.remove('hidden');
                    successMsg.classList.add('animate-on-scroll', 'is-visible');
                    // Scroll up to message
                    successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        });

        window.toggleMenu = function () {
            const menu = document.getElementById('mobile-menu');
            if (menu) menu.classList.toggle('hidden');
        }
    </script>
</body>

</html>
